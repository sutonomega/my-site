<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Echo Note</title>

  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">

</head>

<body>

  <section class="hero">
    <div class="hero-inner">

      <p class="hero-sub">
        MUSIC / VISUAL / ARCHIVE
      </p>

      <h1>Echo Note</h1>

      <p class="hero-copy">
        音楽をつくる、<br>
        気持ちを残す。
      </p>

      <p class="hero-text">
        言えなかった気持ち、
        消えていくはずだった夜、
        送れなかった言葉。
        <br><br>
        Echo Note は、
        そんな感情を音に残すための場所です。
      </p>

      <a href="#works" class="hero-button">
        作品を見る
      </a>

    </div>
  </section>

  <section class="section" id="works">

    <div class="container">

      <div class="section-title">
        <p>ARCHIVE</p>
        <h2>作品一覧</h2>
      </div>

      <div class="works-grid" id="works-grid"></div>

    </div>

  </section>

  <section class="section">

    <div class="container">

      <div class="section-title">
        <p>ABOUT</p>
        <h2>この場所について</h2>
      </div>

      <div class="about">
        <p>
          Echo Note は、
          感情の余韻を音に残すための音楽プロジェクトです。
          <br><br>
          静かな夜や、
          誰にも言えなかった気持ちに寄り添うような音楽を、
          少しずつ記録しています。
        </p>
      </div>

    </div>

  </section>

  <footer>
    © Echo Note
  </footer>

  <script src="script.js"></script>

</body>
</html>
